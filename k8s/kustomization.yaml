# ============================================================
# Pontocare Operation Web - Kustomize 根配置
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pontocare

resources:
  - deployment.yaml

# 镜像标签 — 在 CI/CD 中通过 `kustomize edit set image` 覆盖
images:
  - name: registry.pontosense.net/pontocare/pontocare-operation-web
    newTag: latest

commonLabels:
  app: pontocare-operation-web
  managed-by: kustomize
