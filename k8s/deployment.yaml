apiVersion: v1
kind: Namespace
metadata:
  name: pontocare
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pontocare-operation-web
  namespace: pontocare
  labels:
    app: pontocare-operation-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pontocare-operation-web
  template:
    metadata:
      labels:
        app: pontocare-operation-web
    spec:
      # 优雅关闭
      terminationGracePeriodSeconds: 30
      containers:
        - name: operation-web
          image: 148286033932.dkr.ecr.cn-north-1.amazonaws.com.cn/pontocare/pontocare-operation-web:v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # 存活探针
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          # 就绪探针
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          volumeMounts:
            - name: timezone
              mountPath: /etc/localtime
              readOnly: true
      volumes:
        - name: timezone
          hostPath:
            path: /usr/share/zoneinfo/Asia/Shanghai
      # 优先调度到不同节点
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - pontocare-operation-web
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: pontocare-operation-web
  namespace: pontocare
  labels:
    app: pontocare-operation-web
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      name: http
      protocol: TCP
  selector:
    app: pontocare-operation-web
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pontocare-operation-web
  namespace: pontocare
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
spec:
  ingressClassName: alb
  tls:
    - hosts:
        - www.zhijia365.cn
      secretName: headlamp-zhijia365-tls
  rules:
    - host: www.zhijia365.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pontocare-operation-web
                port:
                  name: http
